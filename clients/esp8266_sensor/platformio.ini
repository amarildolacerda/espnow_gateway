[env:esp8266_sensor]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200
monitor_filters = esp8266_exception_decoder
build_flags = 
    -D FW_VERSION="0.0.1"
    -D DEVICE_NAME="ESP8266_Sensor"
    -D SENSOR_TYPE=SENSOR_TYPE_TEMP_HUM
    -D SLEEP_INTERVAL_SEC=120
    -D SEND_RETRIES=3
    -D ACK_TIMEOUT_MS=200
    -D BATTERY_ADC_PIN=A0
    -D BATTERY_DIVIDER_R1=100000
    -D BATTERY_DIVIDER_R2=10000
    -D OTA_BUTTON_GPIO=0
    -D OTA_BUTTON_HOLD_MS=3000
    -D DHT_PIN=4
    -D DHT_TYPE=DHT22
    -D CONTACT_PIN=5
    -D MOTION_PIN=5
    -D GAS_ANALOG_PIN=A0
    -D RAIN_ANALOG_PIN=A0
    -D RAIN_DIGITAL_PIN=4
    -D TANK_TRIG_PIN=12
    -D TANK_ECHO_PIN=14
    -D TANK_MAX_CM=200
lib_deps = 
    adafruit/DHT sensor library@^1.4.6
    esp8266/ArduinoOTA@^1.0
board_build.flash_mode = dio
board_build.f_cpu = 80000000L
upload_speed = 921600